<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <style>
    .draw-line {
      stroke-dasharray: 1;
      stroke-dashoffset: 0;
    }
    svg:hover .draw-line {
      animation: phosphor-draw-in 1.5s ease-in-out infinite;
    }
    @keyframes phosphor-draw-in {
      0%   { stroke-dashoffset: 1; }
      100% { stroke-dashoffset: 0; }
    }
  </style><rect width="256" height="256" fill="none"/><polyline points="24 72 76 200 128 72 180 200 232 72" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16" class="draw-line" pathLength="1" style="animation-delay: 0s"/><line x1="16" y1="136" x2="240" y2="136" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16" class="draw-line" pathLength="1" style="animation-delay: 0.3s"/></svg>