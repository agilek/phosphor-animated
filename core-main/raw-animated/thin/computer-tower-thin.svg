<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <style>
    .draw-line {
      stroke-dasharray: 2000;
      stroke-dashoffset: 0;
    }
    svg:hover .draw-line {
      animation: phosphor-draw-in 1.5s ease-in-out infinite alternate;
