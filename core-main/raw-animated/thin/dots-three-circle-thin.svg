<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <style>
    .draw-line {
      stroke-dasharray: 2000;
      stroke-dashoffset: 0;
    }
    svg:hover .draw-line {
      animation: phosphor-draw-in 3s ease-in-out infinite alternate;
    }
    @keyframes phosphor-draw-in {
      0%   { stroke-dashoffset: 2000; }
      50%  { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 0; }
    }
  </style><rect width="256" height="256" fill="none"/><circle cx="128" cy="128" r="96" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="8" class="draw-line" pathLength="1" style="animation-delay: 0s"/><circle cx="128" cy="128" r="8"/><circle cx="84" cy="128" r="8"/><circle cx="172" cy="128" r="8"/></svg>